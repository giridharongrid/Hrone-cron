name: HRONE Attendance

on:
  schedule:
    # 8:30 AM IST
    - cron: "0 3 * * 1-5"

    # 9:00 AM IST
    - cron: "30 3 * * 1-5"

    # 6:30 PM IST
    - cron: "0 13 * * 1-5"

    # 7:00 PM IST
    - cron: "30 13 * * 1-5"

  workflow_dispatch:

jobs:
  punch:
    runs-on: ubuntu-latest

    env:
      HRONE_USERNAME: ${{ secrets.HRONE_USERNAME }}
      HRONE_PASSWORD: ${{ secrets.HRONE_PASSWORD }}
      HRONE_DOMAIN_CODE: ${{ secrets.HRONE_DOMAIN_CODE }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java 8
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 8

      - name: Build
        run: ./gradlew bootJar

      - name: Punch Attendance
        run: java -jar build/libs/hrone-attendance.jar
