name: HRONE Attendance

on:
  schedule:
    - cron: "00 1 * * 1-5"
    - cron: "0 12 * * 1-5"

  workflow_dispatch:

jobs:
  punch:
    runs-on: ubuntu-latest

    env:
      HRONE_USERNAME: ${{ secrets.HRONE_USERNAME }}
      HRONE_PASSWORD: ${{ secrets.HRONE_PASSWORD }}
      HRONE_DOMAIN_CODE: ${{ secrets.HRONE_DOMAIN_CODE }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java 8
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 8

      - name: Build
        run: ./gradlew bootJar

      - name: Punch Attendance
        run: java -jar build/libs/hrone-attendance.jar
