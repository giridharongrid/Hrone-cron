name: HRONE Attendance

on:
  schedule:
    - cron: "25 0 * * 1-5"
    - cron: "0 12 * * 1-5"

  workflow_dispatch:

jobs:
  # Skip scheduled runs on these IST calendar days (manual workflow_dispatch still runs).
  should-run:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          D=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          if [ "$D" = "2026-03-23" ] || [ "$D" = "2026-03-24" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled punch on $D (IST)"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  punch:
    needs: should-run
    if: github.event_name == 'workflow_dispatch' || needs.should-run.outputs.proceed == 'true'
    runs-on: ubuntu-latest

    env:
      HRONE_USERNAME: ${{ secrets.HRONE_USERNAME }}
      HRONE_PASSWORD: ${{ secrets.HRONE_PASSWORD }}
      HRONE_DOMAIN_CODE: ${{ secrets.HRONE_DOMAIN_CODE }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java 8
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 8

      - name: Build
        run: ./gradlew bootJar

      - name: Punch Attendance
        run: java -jar build/libs/hrone-attendance.jar
